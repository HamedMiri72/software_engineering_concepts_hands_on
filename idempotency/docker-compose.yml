services:
  postgres:
    image: postgres:16-alpine
    container_name: idempotency-postgres
    environment:
      POSTGRES_DB: idempotency
      POSTGRES_USER: idempotency
      POSTGRES_PASSWORD: idempotency
    ports:
      - "5432:5432"
    volumes:
      - idempotency-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: idempotency-redis
    ports:
      - "6379:6379"

volumes:
  idempotency-postgres-data: