# Self-contained deps for the idempotency project ONLY.
# Container names & ports are namespaced so this never clashes with other concepts.
services:
  postgres:
    image: postgres:16-alpine
    container_name: idempotency-postgres
    environment:
      POSTGRES_DB: idempotency
      POSTGRES_USER: se
      POSTGRES_PASSWORD: se
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U se"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: idempotency-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5